const years=[2019,2020,2021,2022,2023,2024,2025];
let cur='all', sel=null;

function getColor(ev){return CC[ev.cat]||'#888'}
function visible(ev){
  if(cur==='all') return true;
  if(cur==='cn') return ev.region==='cn';
  if(cur==='global') return ev.region==='global';
  return ev.cat===cur;
}

function render(){
  const tl=document.getElementById('tl');
  tl.innerHTML='';
  let shown=0;
  years.forEach(y=>{
    const evs=data.filter(e=>e.y===y);
    if(!evs.length) return;
    const visEvs=evs.filter(e=>visible(e));
    if(!visEvs.length) return;
    shown+=visEvs.length;
    const row=document.createElement('div');
    row.className='yr-row';
    row.innerHTML=`<div class="yr-lbl">${y}</div>`;
    const track=document.createElement('div');
    track.className='yr-track';
    track.innerHTML='<div class="hline"></div>';
    const er=document.createElement('div');
    er.className='ev-row';
    evs.forEach(ev=>{
      const hide=!visible(ev);
      const c=document.createElement('div');
      c.className='card'+(hide?' hidden':'');
      c.dataset.idx=data.indexOf(ev);
      const col=getColor(ev);
      const cnBadge=ev.region==='cn'?`<span class="badge-cn">CN</span>`:'';
      const rBadge=ev.cat==='reasoning'?`<span class="badge-r">推理</span>`:'';
      c.innerHTML=`<div class="card-top"><span class="dot" style="background:${col}"></span><span class="card-co">${ev.co}</span>${cnBadge}${rBadge}</div><div class="card-name">${ev.name}</div><div class="card-date">${ev.m}</div>`;
      c.onclick=()=>openP(data.indexOf(ev));
      er.appendChild(c);
    });
    track.appendChild(er);
    row.appendChild(track);
    tl.appendChild(row);
  });
  const cnC=data.filter(e=>visible(e)&&e.region==='cn').length;
  const glC=data.filter(e=>visible(e)&&e.region==='global').length;
  document.getElementById('stats').innerHTML=`<span class="stat">共 <b>${shown}</b> 个模型</span><span class="stat">中国团队 <b>${cnC}</b></span><span class="stat">海外团队 <b>${glC}</b></span>`;
}

function filt(f){
  cur=f;
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.f===f));
  closeP();
  render();
}
function openP(idx){
  const ev=data[idx];
  if(sel===idx){closeP();return;}
  sel=idx;
  document.getElementById('pt').textContent=`${ev.co} · ${ev.name}（${ev.m}）`;
  document.getElementById('pb').textContent=ev.note;
  const p=document.getElementById('panel');
  p.className='panel open';
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeP(){sel=null;document.getElementById('panel').className='panel';}
render();
</script>
